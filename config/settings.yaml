# Research Factory RF-1.5 Configuration
llm:
  # GitHub Models API (OpenAI-compatible endpoint)
  # 也可替换为 GitHub Copilot SDK 的端点
  api_base: "https://models.github.ai/inference"
  api_key: "${GITHUB_TOKEN}"       # 从环境变量读取
  default_model: "openai/gpt-4o"  # 可选: openai/o4-mini, anthropic/claude-sonnet-4, 等
  temperature: 0.4
  max_tokens: 8192

pipeline:
  # 研究主题（可运行时覆盖）
  topic: "Grafting Linear Attention Operators into Transformer-based LLMs for Efficient Long-Context Inference"
  target_model_size: "8B-14B"
  quantization: "INT8"
  hardware_budget_gb: 16            # 单卡显存预算 (GB)

  # 新增默认审计阈值
  flops_threshold_tflops: 21        # FLOPs 默认阈值 (单位：TeraFLOPs)
  network_bandwidth_gbps: 0       # 网络带宽阈值 (单位：Gbps)
  power_budget_watts: 290          # 功率预算阈值 (单位：瓦特)

  # 各阶段开关
  phases:
    intelligence: true
    dissection: true
    debate: true
    quality: true

search:
  arxiv_max_results: 50
  github_stars_threshold: 100
  openreview_venues:
    - "ICLR.cc/2026/Conference"
    - "NeurIPS.cc/2025/Conference"
    - "CVPR/2026"

output:
  latex_template: "templates/neurips_2026.tex"
  output_dir: "output/"