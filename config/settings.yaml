# Research Factory RF-1.5 Configuration
llm:
  api_key: "${GITHUB_TOKEN}"
  api_base: "https://models.github.ai/inference"
  default_model: "openai/gpt-4o"
  temperature: 0.4
  max_tokens: 4096

agents:
  TrendAnalyst:
    model: "openai/gpt-4o"
    temperature: 0.2
  HardwareGuardian:
    model: "openai/gpt-4o-mini"
    temperature: 0.0
  NoveltyAuditor:
    model: "openai/gpt-4o"
    temperature: 0.1
  SourceArchaeologist:
    model: "openai/gpt-4o"
    temperature: 0.2
  MathTranslator:
    model: "openai/gpt-4o"
    temperature: 0.0
  ConflictDetector:
    model: "openai/gpt-4o"
    temperature: 0.3
  Proposer:
    model: "openai/gpt-4o"
    temperature: 0.8
  Critic:
    model: "openai/gpt-4o"
    temperature: 0.9
  Mediator:
    model: "openai/gpt-4o"
    temperature: 0.4
  QualityInspector:
    model: "openai/gpt-4o-mini"
    temperature: 0.1
  PublicationStrategist:
    model: "openai/gpt-4o"
    temperature: 0.6
  EditorInChief:
    model: "openai/gpt-4o"
    temperature: 0.3
    max_tokens: 8192

pipeline:
  # 研究主题（可运行时覆盖）
  topic: "Grafting Linear Attention Operators into Transformer-based LLMs for Efficient Long-Context Inference"
  target_model_size: "8B-14B"
  quantization: "INT8"
  hardware_budget_gb: 16            # 单卡显存预算 (GB)

  # 新增默认审计阈值
  flops_threshold_tflops: 21        # FLOPs 默认阈值 (单位：TeraFLOPs)
  network_bandwidth_gbps: 0       # 网络带宽阈值 (单位：Gbps)
  power_budget_watts: 290          # 功率预算阈值 (单位：瓦特)

  # 各阶段开关
  phases:
    intelligence: true
    dissection: true
    debate: true
    quality: true

search:
  arxiv_max_results: 50
  github_stars_threshold: 100
  openreview_venues:
    - "ICLR.cc/2026/Conference"
    - "NeurIPS.cc/2025/Conference"
    - "CVPR/2026"

output:
  latex_template: "templates/neurips_2026.tex"
  output_dir: "output/"
